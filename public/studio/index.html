<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScandiJapandi Admin Studio</title>
  <!-- Vi henter Sanity Studio direkte via CDN for å slippe Astro-krøll -->
  <script type="module">
    import {renderStudio} from 'https://esm.sh/sanity@3.35.0'
    import {defineConfig} from 'https://esm.sh/sanity@3.35.0'
    import {deskTool} from 'https://esm.sh/sanity@3.35.0/desk'

    const config = defineConfig({
      projectId: 'v78bby2g', // Din eksakte Sanity prosjekt-ID
      dataset: 'production',
      title: 'ScandiJapandi Admin',
      basePath: '/studio',
      plugins: [deskTool()],
    })

    renderStudio(document.getElementById('sanity'), config)
  </script>
</head>
<body style="margin: 0; padding: 0;">
  <div id="sanity"></div>
</body>
</html>
