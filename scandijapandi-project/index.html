<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scandi Japandi Collection</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#001F3F',
                        gold: '#C5A05B',
                        softGrey: '#F5F7FA',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-white text-navy font-sans antialiased; }
            h1, h2, h3 { @apply font-serif font-light; }
        }
        
        .hero-bg {
            background-size: cover;
            background-position: center;
        }

        .fade-in { animation: fadeIn 1.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-navy overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-softGrey">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer group" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <div class="w-10 h-10 flex items-center justify-center text-black">
                    <svg viewBox="0 0 100 120" class="w-full h-full text-current transition-transform duration-500 group-hover:scale-110">
                        <path d="M50 110 C50 110 50 60 50 20" stroke="currentColor" stroke-width="2" fill="none" />
                        <path d="M50 80 Q30 75 25 55 Q35 50 50 80" fill="currentColor" />
                        <path d="M50 60 Q70 55 75 35 Q65 30 50 60" fill="currentColor" opacity="0.8" />
                    </svg>
                </div>
                <div>
                    <span class="text-2xl font-light tracking-tight">Scandi Japandi</span>
                    <span class="block text-[10px] tracking-[0.25em] text-navy/50 font-bold uppercase">COLLECTION</span>
                </div>
            </div>

            <nav class="hidden md:flex items-center gap-10 text-xs font-bold uppercase tracking-[0.2em]">
                <a href="#collection" data-t="nav-collection" class="hover:text-gold transition-colors">Collection</a>
                <a href="#story" data-t="nav-story" class="hover:text-gold transition-colors">Our Story</a>
                <a href="#makers" data-t="nav-makers" class="hover:text-gold transition-colors">For Makers</a>
                <a href="#contact" data-t="nav-contact" class="hover:text-gold transition-colors">Contact</a>
            </nav>

            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-navy/40">
                <button onclick="setLang('EN')" id="btn-EN" class="hover:text-navy transition-colors">EN</button>
                <button onclick="setLang('NO')" id="btn-NO" class="hover:text-navy transition-colors">NO</button>
                <button onclick="setLang('SV')" id="btn-SV" class="hover:text-navy transition-colors">SV</button>
                <button onclick="setLang('DA')" id="btn-DA" class="hover:text-navy transition-colors">DA</button>
                <button onclick="setLang('JA')" id="btn-JA" class="hover:text-navy transition-colors">JA</button>
            </div>
        </div>
    </header>

    <section id="hero-section" class="hero-bg h-screen flex items-center justify-center text-center relative px-6" style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.3)), url('/images/hero.jpg');">
        <div class="relative z-10 max-w-5xl fade-in text-white">
            <h1 id="hero-title" data-t="hero-title" class="text-5xl md:text-7xl lg:text-8xl font-light leading-tight mb-8 tracking-tight drop-shadow-sm">
                Timeless Scandinavian<br>Craftsmanship
            </h1>
            <p id="hero-subtitle" data-t="hero-subtitle" class="text-lg md:text-2xl font-light opacity-90 mb-12 max-w-2xl mx-auto tracking-wide drop-shadow-sm">
                Curated for Japanese homes through trusted curators
            </p>
            <div class="flex justify-center">
                <a href="#collection" data-t="hero-button" class="inline-block px-12 py-5 border border-white text-xs font-bold uppercase tracking-[0.4em] hover:bg-white hover:text-navy transition-all duration-700">
                    Explore the Collection
                </a>
            </div>
        </div>
        
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 text-white/50">
            <span class="text-[9px] uppercase tracking-[0.2em] font-bold">Scroll</span>
            <div class="w-px h-12 bg-white/30"></div>
        </div>
    </section>
